services:
  - type: web
    name: match3-backend
    env: python
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: EXPECTED_CHAIN_ID
        value: 11155111
      - key: NETWORK_NAME
        value: Sepolia Test Network
      - key: RPC_URL
        sync: false
      - key: CONTRACT_ADDRESS
        sync: false
      - key: HUGGINGFACEHUB_API_TOKEN
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
